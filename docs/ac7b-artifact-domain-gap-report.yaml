# -----------------------------------------------------------------------------
# HISTORICAL GAP FINDINGS
# These 3 gaps were identified during the Sub-AC 7b audit by tracing the
# controlled vocabulary and comparing it against the task record fields.
# They were remediated in the same session (Sub-AC 7c key update).
# They are preserved here as the audit record with specific file:line locations.
# -----------------------------------------------------------------------------

historical_gaps:

  - id: GAP-001
    status: REMEDIATED
    remediated_in: "Sub-AC 7c (same session)"
    gap_type: UNREGISTERED_PRODUCES_KEY
    severity: HIGH
    file: tests/task_model/scalex_tasks.py
    line: 194
    task: sdi_init
    field: produces_evidence_key
    found_value: "sdi_init:completion"
    reason: >-
      The aspect "completion" is a banned lifecycle verb per
      ops/artifact_vocabulary.ArtifactDescriptor.__post_init__ (banned set:
      completion, done, finished, ran, executed, ok).  This key was not registered
      in ARTIFACT_REGISTRY.  The controlled vocabulary registered "sdi_init:vm_list"
      (GranularityLevel.FINE) as the correct produces_evidence_key for this task.
    registered_alternative: "sdi_init:vm_list"
    registered_alternative_granularity: FINE
    registered_alternative_file: ops/artifact_vocabulary.py
    registered_alternative_line: 154
    fix_applied: >-
      Changed produces_evidence_key from "sdi_init:completion" to "sdi_init:vm_list"
      at tests/task_model/scalex_tasks.py (now at line ~214, annotated with
      "# [Sub-AC 7c] was sdi_init:completion -- replaced with registered identifier").
    note: >-
      The module docstring diagram at line 25 correctly showed
      "sdi_verify_vms evidence_deps: [sdi_init:vm_list]" — confirming the
      diagram was authoritative and the code had drifted.

  - id: GAP-002
    status: REMEDIATED
    remediated_in: "Sub-AC 7c (same session)"
    gap_type: UNREGISTERED_EVIDENTIAL_DEP_KEY
    severity: HIGH
    file: tests/task_model/scalex_tasks.py
    line: 212
    task: sdi_verify_vms
    field: "evidence_deps[0].evidence_key"
    found_value: "sdi_init:completion"
    reason: >-
      The EvidentialDep for sdi_verify_vms referenced "sdi_init:completion"
      which was not in the artifact vocabulary (banned aspect "completion").
      The vocabulary registered "sdi_init:vm_list" as the artifact produced by
      sdi_init.  This dep had to reference the registered key so the executor
      can check freshness and trigger re-check against the correct vocabulary entry.
    registered_alternative: "sdi_init:vm_list"
    registered_alternative_granularity: FINE
    root_cause: GAP-001
    fix_applied: >-
      Changed evidence_key from "sdi_init:completion" to "sdi_init:vm_list"
      at tests/task_model/scalex_tasks.py (now at line ~230, annotated with
      "# [Sub-AC 7c] was sdi_init:completion -- updated to registered key").

  - id: GAP-003
    status: REMEDIATED
    remediated_in: "Sub-AC 7c (same session)"
    gap_type: UNREGISTERED_EVIDENTIAL_DEP_KEY
    severity: HIGH
    file: tests/task_model/scalex_tasks.py
    line: 241
    task: sdi_health_check
    field: "evidence_deps[0].evidence_key"
    found_value: "sdi_init:completion"
    reason: >-
      The EvidentialDep for sdi_health_check referenced "sdi_init:completion"
      which was not in the artifact vocabulary (banned aspect "completion").
    registered_alternative: "sdi_init:vm_list"
    registered_alternative_granularity: FINE
    root_cause: GAP-001
    fix_applied: >-
      Changed evidence_key from "sdi_init:completion" to "sdi_init:vm_list"
      at tests/task_model/scalex_tasks.py (now at line ~256, annotated with
      "# [Sub-AC 7c] was sdi_init:completion -- updated to registered key").

