# ADDITIONAL OBSERVATIONS (informational, not counted as gaps)
# -----------------------------------------------------------------------------

observations:

  - id: OBS-001
    topic: docstring_diagram_was_correct
    file: tests/task_model/scalex_tasks.py
    line: 25
    detail: >-
      The module docstring diagram at line 25 shows
      "sdi_verify_vms evidence_deps: [sdi_init:vm_list]" which is the CORRECT
      registered key.  The diagram was authoritative; the code had drifted to
      "sdi_init:completion" in three places (GAP-001, GAP-002, GAP-003).
      The fix aligned the code back to the diagram's intent.

  - id: OBS-002
    topic: ops_task_model_no_scope_artifact_ids
    file: ops/task_model.py
    line: 164
    detail: >-
      The ops-layer Task dataclass (ops/task_model.py) does not have a
      scope_artifact_ids field.  Only the tests/task_model/model.py Task has
      this field.  The ops executor (ops/executor.py) therefore cannot validate
      artifact domain references at execution time.  Not counted as a gap in
      the existing task records (those are in tests/task_model/scalex_tasks.py),
      but is a structural gap in the ops layer for future unification work.

  - id: OBS-003
    topic: test_scaffold_generic_scopes
    detail: >-
      Test-scaffold tasks in tests/test_dep_graph_enforcement.py and
      tests/task_model/test_causal_deps.py use generic scope strings
      ("scope", "unit-test scope", "test-scope:A", etc.) without structured
      artifact domain references.  This is intentional — scaffold tasks test
      the model machinery, not operational domains.  Explicitly out of scope
      for this audit per the declared scope boundary above.

