apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-app
  namespace: argocd
spec:
  project: bootstrap
  source:
    repoURL: https://github.com/JinwangMok/k8s-playbox.git
    targetRevision: main
    path: gitops-apps/bootstrap
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
