apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: base
  namespace: argocd
spec:
  description: "관리자 외 접근 금지 핵심 프로젝트. (실패 시 클러스터 붕괴)"
  sourceRepos:
    - "https://github.com/JinwangMok/k8s-playbox.git"
    - "https://argoproj.github.io/argo-helm"
    - "https://helm.cilium.io/"
  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "argocd"
    - server: "https://kubernetes.default.svc"
      namespace: "kube-system" # cilium, cilium-resources
    - server: "https://kubernetes.default.svc"
      namespace: "cilium-secrets" # cilium, cilium-resources
  clusterResourceWhitelist:
    - group: ""
      kind: "Namespace"
    # Cilium
    - group: "cilium.io"
      kind: "CiliumLoadBalancerIPPool"
    - group: "cilium.io"
      kind: "CiliumL2AnnouncementPolicy"
    # Networking
    - group: "gateway.networking.k8s.io"
      kind: "GatewayClass"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
      warn: true
---
# Disable <default> project's super permission
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: default
spec:
  sourceRepos: []
  sourceNamespaces: []
  destinations: []
  namespaceResourceBlacklist:
    - group: "*"
      kind: "*"