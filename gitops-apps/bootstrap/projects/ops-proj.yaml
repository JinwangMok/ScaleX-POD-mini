apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: dev
  namespace: argocd
spec:
  description: "운영에 영향이 있을 수 있는 프로젝트 (실패 시 기능/서비스 다소 붕괴)"
  sourceRepos:
    - "https://github.com/JinwangMok/k8s-playbox.git"

  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "default"

  clusterResourceWhitelist:
    - group: ""
      kind: "Namespace"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  orphanedResources:
    warn: true
