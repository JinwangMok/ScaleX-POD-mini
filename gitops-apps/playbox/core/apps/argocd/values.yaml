# Argo CD 서버 관련 설정
server:
    # Argo CD UI 및 API 서버에 접근하기 위한 Service 타입을 'NodePort'로 지정
    # 이렇게 하면 클러스터의 모든 노드 IP와 할당된 포트를 통해 Argo CD UI에 접속할 수 있음
    service:
        type: NodePort
    # 고가용성(HA)을 위한 복제본 수를 1로 설정하여 최소한의 리소스를 사용
    replicas: 1
# Argo CD의 핵심 컨트롤러 설정
controller:
    replicas: 1
# Git 리포지토리와의 통신을 담당하는 서버 설정
repoServer:
    replicas: 1
# Argo CD가 사용하는 Redis 설정
redis:
    # 별도의 Redis를 사용하지 않고, Argo CD 차트에 포함된 경량화된 버전을 사용
    # 고가용성 모드는 일단 비활성화
    ha:
        enabled: false
# Argo CD 애플리케이션 상태 등을 저장하기 위한 데이터 영속성(Persistence) 설정
# 최소 기능을 위해 비활성화합니다. 이 경우 Argo CD 파드가 재시작되면 일부 UI 캐시 등이 초기화될 수 있으나,
# 모든 애플리케이션 정보는 Git에 저장되어 있으므로 복구됨
# 운영 환경에서는 PersistentVolumeClaim (PVC)을 사용하여 활성화하는 것을 권장한다고 함
persistence:
    enabled: false
global:
    # -- Default domain used by all components
    ## Used for ingresses, certificates, SSO, notifications, etc.
    domain: cd.jinwang.dev
configs:
    params:
        # HTTP로 서버 실행
        server.insecure: "true"
