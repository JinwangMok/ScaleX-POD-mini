# socks5-proxy/deploy.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socks5-proxy
  namespace: kube-system
  labels:
    app: socks5-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: socks5-proxy
  template:
    metadata:
      labels:
        app: socks5-proxy
    spec:
      # 제어 평면 노드에서 실행되도록 설정하신 부분 유지
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: socks5-proxy
        image: serjs/go-socks5-proxy:latest
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        ports:
        - containerPort: 1080
          name: socks
        env:
        - name: PROXY_PORT
          value: "1080"
        - name: PROXY_USER
          valueFrom:
            secretKeyRef:
              name: socks5-creds
              key: PROXY_USER
        - name: PROXY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: socks5-creds
              key: PROXY_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: socks5-proxy
  namespace: kube-system
spec:
  selector:
    app: socks5-proxy
  ports:
    - protocol: TCP
      port: 1080
      targetPort: 1080