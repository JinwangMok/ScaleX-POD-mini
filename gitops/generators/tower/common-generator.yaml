# Common apps deployed to Tower cluster
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tower-common
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - appName: cilium
            namespace: kube-system
            syncWave: "1"
          - appName: cilium-resources
            namespace: kube-system
            syncWave: "2"
          - appName: cert-manager
            namespace: cert-manager
            syncWave: "1"
          - appName: cluster-config
            namespace: kube-system
            syncWave: "0"
          - appName: kyverno
            namespace: kyverno
            syncWave: "1"
  template:
    metadata:
      name: "tower-{{.appName}}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
    spec:
      project: tower-project
      source:
        repoURL: https://github.com/JinwangMok/k8s-playbox.git
        targetRevision: main
        path: "gitops/common/{{.appName}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
