# Tower-specific apps (management cluster)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tower-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - appName: cilium
            namespace: kube-system
            syncWave: "1"
          - appName: local-path-provisioner
            namespace: local-path-storage
            syncWave: "1"
          - appName: cluster-config
            namespace: kube-system
            syncWave: "0"
          - appName: argocd
            namespace: argocd
            syncWave: "0"
          - appName: cert-issuers
            namespace: cert-manager
            syncWave: "2"
          - appName: keycloak
            namespace: keycloak
            syncWave: "3"
          - appName: cloudflared-tunnel
            namespace: kube-tunnel
            syncWave: "3"
  template:
    metadata:
      name: "tower-{{.appName}}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
    spec:
      project: tower-project
      source:
        repoURL: https://github.com/JinwangMok/ScaleX-POD-mini.git
        targetRevision: main
        path: "gitops/tower/{{.appName}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      ignoreDifferences:
        # StatefulSet volumeClaimTemplates: Kubernetes adds storageClassName/volumeMode/
        # resources defaults after creation. This field is also immutable post-creation
        # so ArgoCD self-heal cannot fix it — ignore to prevent perpetual OutOfSync.
        # StatefulSet/Deployment replicas: install.sh bootstrap sets replicas via Helm
        # values; HPA or manual scaling also mutates this field legitimately.
        - group: apps
          kind: StatefulSet
          jsonPointers:
            - /spec/replicas
            - /spec/volumeClaimTemplates
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        # Service clusterIP/clusterIPs: auto-assigned by Kubernetes API server at
        # creation time; not present in git manifests, always causes false OutOfSync.
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/clusterIP
            - /spec/clusterIPs
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
