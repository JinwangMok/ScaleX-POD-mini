# Common apps deployed to Sandbox cluster (remote)
# NOTE: Update destinationServer after registering Sandbox in ArgoCD
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: sandbox-common
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - appName: cilium
            namespace: kube-system
            syncWave: "1"
          - appName: cilium-resources
            namespace: kube-system
            syncWave: "2"
          - appName: cert-manager
            namespace: cert-manager
            syncWave: "1"
          - appName: cluster-config
            namespace: kube-system
            syncWave: "0"
          - appName: kyverno
            namespace: kyverno
            syncWave: "1"
  template:
    metadata:
      name: "sandbox-{{.appName}}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
    spec:
      project: sandbox-project
      source:
        repoURL: https://github.com/JinwangMok/k8s-playbox.git
        targetRevision: main
        path: "gitops/common/{{.appName}}"
      destination:
        # Replace with actual Sandbox cluster server URL after ArgoCD registration
        server: "https://sandbox-api:6443"
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
