# Common apps deployed to Sandbox cluster (remote)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: sandbox-common
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - appName: cilium-resources
            namespace: kube-system
            syncWave: "2"
          - appName: cert-manager
            namespace: cert-manager
            syncWave: "1"
          - appName: kyverno
            namespace: kyverno
            syncWave: "1"
          - appName: kyverno-policies
            namespace: kyverno
            syncWave: "2"
          - appName: scalex-dash-rbac
            namespace: scalex-system
            syncWave: "4"
  template:
    metadata:
      name: "sandbox-{{.appName}}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
    spec:
      project: sandbox-project
      source:
        repoURL: https://github.com/JinwangMok/ScaleX-POD-mini.git
        targetRevision: main
        path: "gitops/common/{{.appName}}"
      destination:
        name: sandbox
        namespace: "{{.namespace}}"
      ignoreDifferences:
        # StatefulSet volumeClaimTemplates: Kubernetes adds storageClassName/volumeMode/
        # resources defaults after creation. This field is also immutable post-creation
        # so ArgoCD self-heal cannot fix it — ignore to prevent perpetual OutOfSync.
        # StatefulSet/Deployment replicas: install.sh bootstrap sets replicas via Helm
        # values; HPA or manual scaling also mutates this field legitimately.
        - group: apps
          kind: StatefulSet
          jsonPointers:
            - /spec/replicas
            - /spec/volumeClaimTemplates
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        # Service clusterIP/clusterIPs: auto-assigned by Kubernetes API server at
        # creation time; not present in git manifests, always causes false OutOfSync.
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/clusterIP
            - /spec/clusterIPs
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
