# Sandbox-specific apps (workload cluster)
# NOTE: Update destinationServer after registering Sandbox in ArgoCD
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: sandbox-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - appName: cluster-config
            namespace: kube-system
            syncWave: "0"
          - appName: cilium
            namespace: kube-system
            syncWave: "1"
          - appName: local-path-provisioner
            namespace: local-path-storage
            syncWave: "1"
          - appName: rbac
            namespace: kube-system
            syncWave: "4"
          - appName: test-resources
            namespace: test
            syncWave: "2"
  template:
    metadata:
      name: "sandbox-{{.appName}}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
    spec:
      project: sandbox-project
      source:
        repoURL: https://github.com/JinwangMok/ScaleX-POD-mini.git
        targetRevision: main
        path: "gitops/sandbox/{{.appName}}"
      destination:
        # Replace with actual Sandbox cluster server URL after ArgoCD registration
        server: "https://sandbox-api:6443"
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
