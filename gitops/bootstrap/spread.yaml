# Multi-cluster bootstrap: Tower (management) + Sandbox (workload)
# Applied via: kubectl apply -f gitops/bootstrap/spread.yaml
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: playbox-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Root AppProject for bootstrap — manages generators (ApplicationSets) only."
  sourceRepos:
    - "https://github.com/JinwangMok/ScaleX-POD-mini.git"
  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "argocd"
  namespaceResourceWhitelist:
    - group: "argoproj.io"
      kind: "AppProject"
    - group: "argoproj.io"
      kind: "Application"
    - group: "argoproj.io"
      kind: "ApplicationSet"
---
# Tower cluster root: deploys tower generators (common + tower-specific)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tower-root
  namespace: argocd
spec:
  project: playbox-root
  source:
    repoURL: https://github.com/JinwangMok/ScaleX-POD-mini.git
    targetRevision: main
    path: gitops/generators/tower
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# Sandbox cluster root: deploys sandbox generators (common + sandbox-specific)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sandbox-root
  namespace: argocd
spec:
  project: playbox-root
  source:
    repoURL: https://github.com/JinwangMok/ScaleX-POD-mini.git
    targetRevision: main
    path: gitops/generators/sandbox
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# Deploy per-cluster AppProjects (required by all ApplicationSet-generated Applications)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-projects
  namespace: argocd
spec:
  project: playbox-root
  source:
    repoURL: https://github.com/JinwangMok/ScaleX-POD-mini.git
    targetRevision: main
    path: gitops/projects
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# Lock down default project
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: default
spec:
  sourceRepos: []
  sourceNamespaces: []
  destinations: []
  namespaceResourceBlacklist:
    - group: "*"
      kind: "*"
