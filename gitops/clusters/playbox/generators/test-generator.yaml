apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: test-generator
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - appName: test-resources
            namespace: test
            syncWave: "0"
  template:
    metadata:
      name: "{{.appName}}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
    spec:
      project: test-project
      source:
        repoURL: https://github.com/JinwangMok/k8s-playbox.git
        targetRevision: main
        path: "gitops/clusters/playbox/apps/test/{{.appName}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
