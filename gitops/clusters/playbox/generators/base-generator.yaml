apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: base-generator
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - appName: argocd
            namespace: argocd
            syncWave: "0"
          - appName: cilium
            namespace: kube-system
            syncWave: "1"
          - appName: cilium-resources
            namespace: kube-system
            syncWave: "2"
          - appName: cert-manager
            namespace: cert-manager
            syncWave: "1"
          - appName: cloudflared-tunnel
            namespace: kube-tunnel
            syncWave: "3"
          - appName: socks5-proxy
            namespace: kube-tunnel
            syncWave: "3"
          - appName: keycloak
            namespace: keycloak
            syncWave: "3"
          - appName: local-path-provisioner
            namespace: local-path-storage
            syncWave: "1"
          - appName: rbac
            namespace: kube-system
            syncWave: "4"
          - appName: cluster-config
            namespace: kube-system
            syncWave: "0"
  template:
    metadata:
      name: "{{.appName}}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
    spec:
      project: base-project
      source:
        repoURL: https://github.com/JinwangMok/k8s-playbox.git
        targetRevision: main
        path: "gitops/clusters/playbox/apps/base/{{.appName}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
