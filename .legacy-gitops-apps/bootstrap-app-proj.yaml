apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: bootstrap
  namespace: argocd
  finalizers: # 삭제 방지
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "ArgoCD 부트스트래핑을 위한 프로젝트. 이를 통해 다른 모든 AppProject와 App-of-Apps를 배포."
  sourceRepos:
    - "https://github.com/SmartX-Team/DataX-Ops.git"
  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "argocd"
  namespaceResourceWhitelist:
    - group: "argoproj.io"
      kind: "AppProject"
    - group: "argoproj.io"
      kind: "Application"
