# 참고: https://docs.cilium.io/en/stable/operations/performance/tuning/

# ==============================================================================
# 하드웨어 및 기본 연결 설정 (Bonding 반영)
# ==============================================================================
# Cilium이 사용할 네트워크 인터페이스 명시
# eth0, eth1이 아닌 논리 인터페이스 'bond0' 지정 (Active-Backup)
devices: "bond0"

# kube-proxy 제거 (eBPF로 완전 대체)
kubeProxyReplacement: true
k8sServiceHost: 127.0.0.1
k8sServicePort: 6443

operator:
  replicas: 2
  rollOutPods: true

# ==============================================================================
# Datapath & Routing (100G 성능 핵심 튜닝)
# ==============================================================================
# IPAM 모드
ipam:
  mode: "cluster-pool"

ipMasqAgent:
  enabled: false

# Native Routing: VXLAN 터널링 오버헤드 제거
routingMode: native
# 동일 L2 네트워크(Bonding) 내 노드 간 라우팅 자동 설정
autoDirectNodeRoutes: true

# Netkit 모드 (Kernel 6.8+)
# veth 가상 장치 오버헤드를 제거하여 호스트-파드 직결
bpf:
  datapathMode: netkit
  masquerade: true
  # iptables 완전 우회 (성능 향상)
  hostLegacyRouting: false
  # BPF Map 성능 튜닝 (락 경합 감소)
  distributedLRU:
    enabled: true
  mapDynamicSizeRatio: 0.08
  # VLAN 필터링 우회
  vlanBypass: [0]

# BIG TCP 활성화 (CPU 부하 감소)
# bond0의 MTU가 9000이어도 커널 내부에서는 최대 192KB~512KB 패킷 처리
enableIPv4BIGTCP: true
enableIPv6BIGTCP: false

# 아래 설정이 동작하지 않아 강제 주입
# ipv4NativeRoutingCIDR: "10.233.0.0/16"
extraConfig:
  ipv4-native-routing-cidr: "10.233.0.0/16"
  enable-ip-masq-agent: "false"

ipv4:
  enabled: true
ipv6:
  enabled: false

# ==============================================================================
# Load Balancer & Acceleration
# ==============================================================================
loadBalancer:
  # DSR 모드 (Direct Server Return)
  # 응답 패킷이 LB를 거치지 않고 클라이언트로 직행
  mode: dsr

  # XDP 가속
  # Bonding 인터페이스(bond0) 상에서 Native XDP 구동
  # Kernel 6.8은 Bonding XDP를 잘 지원하지만, 만약 배포 실패 시 'disabled'로 변경 고려
  # TODO: 나중에 테스트
  acceleration: disabled # native

# 소켓 레벨 로드밸런싱
socketLB:
  enabled: true

# BPF Clock Probe (Jiffies 사용으로 성능 향상)
bpfClockProbe: true

# ==============================================================================
# Gateway API
# ==============================================================================
gatewayAPI:
  enabled: true
  # 기존 설정이던 false로 유지 (TBD)
  enableProxyProtocol: false
  enableAppProtocol: false
  enableAlpn: false

  xffNumTrustedHops: 0
  externalTrafficPolicy: Cluster

  gatewayClass:
    create: auto
  secretsNamespace:
    create: true
    name: cilium-secrets
    sync: true

  # Host Network 사용 안 함
  hostNetwork:
    enabled: false
    nodes:
      matchLabels: {}

# Ingress Controller는 Gateway API 사용으로 인해 비활성화
ingressController:
  enabled: false
  default: false
  loadbalancerMode: dedicated
  enforceHttps: true
  enableProxyProtocol: false

# ==============================================================================
# 기타 네트워크 기능
# ==============================================================================
l2announcements:
  enabled: true

externalIPs:
  enabled: true

# 대역폭 관리 및 BBR (100G 환경 권장)
bandwidthManager:
  enabled: true
  bbr: true

# 암호화 비활성화 (성능 필수)
encryption:
  enabled: false

# ==============================================================================
# Observability (Hubble)
# ==============================================================================
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
  # 100G 트래픽 모니터링 시 이벤트 유실 방지를 위해 큐 사이즈 증설
  eventQueueSize: 32768
  metrics:
    enableOpenMetrics: true

# ==============================================================================
# 시스템 설정
# ==============================================================================
# 커널 파라미터 자동 튜닝
sysctlfix:
  enabled: true

debug:
  enabled: false
