# ==================================================================
# k8s-playbox/values.yaml — Single source of truth
# ==================================================================

cluster:
  name: playbox
  domain: jinwang.dev

# --- Node Definitions with Interface Specs ---
nodes:
  superuser: jinwang
  ansible_user: ansible_user
  ssh_key: "~/.ssh/id_ed25519"

  control_plane:
    - name: playbox-0
      ip: "192.168.88.8/24"
      roles: [control-plane, worker]
      labels:
        node-role: control-plane
      network:
        bond_mode: active-backup
        bond_roles: [common]
      interfaces:
        - name: eno1
          role: common
          mac: "64:00:6a:5c:ac:dd"
          type: ether
          speed: 1G
          mtu: 1500

  workers:
    - name: playbox-1
      ip: "192.168.88.9/24"
      roles: [worker]
      labels:
        node-role: worker
      network:
        bond_mode: active-backup
        bond_roles: [common]
      interfaces:
        - name: eno1
          role: common
          mac: "64:00:6a:5c:b0:53"
          type: ether
          speed: 1G
          mtu: 1500

    - name: playbox-2
      ip: "192.168.88.10/24"
      roles: [worker]
      labels:
        node-role: worker
      network:
        bond_mode: active-backup
        bond_roles: [common]
      interfaces:
        - name: eno1
          role: common
          mac: "98:90:96:c6:86:30"
          type: ether
          speed: 1G
          mtu: 1500

    - name: playbox-3
      ip: "192.168.88.11/24"
      roles: [worker]
      labels:
        node-role: worker
        gpu_node: "true"
      network:
        bond_mode: active-backup
        bond_roles: [common, data]
        bond_priority: ["10G", "1G"]
      interfaces:
        - name: eno1
          role: common
          mac: "40:b0:34:1a:80:0b"
          type: ether
          speed: 1G
          mtu: 1500
        - name: ens2f0np0
          role: data
          mac: "b8:59:9f:f5:a5:a2"
          type: ether
          speed: 10G
          mtu: 1500
        - name: ens2f1np1
          role: data
          mac: "b8:59:9f:f5:a5:a3"
          type: ether
          speed: 10G
          mtu: 1500
          state: down

# --- Network ---
network:
  gateway: "192.168.88.1"
  nameservers: ["8.8.8.8", "8.8.4.4"]
  service_cidr: "10.233.0.0/18"
  pod_cidr: "10.233.64.0/18"
  native_routing_cidr: "10.233.0.0/16"
  bond:
    enabled: true
    mode: active-backup
    roles: [common, data]

# --- Management ---
management:
  bastion_host: playbox-0
  bastion_ip: "100.64.0.1"          # Tailscale IP (openclaw-vm → playbox-0)
  bastion_user: jinwang

# --- Tower Cluster (OpenTofu + k3s) ---
tower:
  enabled: true
  host: playbox-0
  vm:
    name: tower-vm
    cpus: 2
    memory_mb: 2048
    disk_gb: 20
    ip: "192.168.88.100"
  k3s:
    version: "v1.33.1+k3s1"

# --- Sandbox Cluster (Kubespray) ---
sandbox:
  kubernetes_version: "1.33.1"
  kubespray_version: "v2.30.0"

# --- Cloudflare ---
cloudflare:
  tunnel_name: "playbox-admin-static"
  credentials_file: ""
  cert_file: ""

# --- Domains ---
domains:
  auth: "auth.jinwang.dev"
  argocd: "cd.jinwang.dev"
  k8s_api: "api.k8s.jinwang.dev"

# --- Keycloak ---
keycloak:
  admin_user: "admin"
  admin_password: ""  # Set in credentials/secrets.yaml
  realm: "kubernetes"
  client_id: "kubernetes"
  db_password: ""  # Set in credentials/secrets.yaml

# --- ArgoCD ---
argocd:
  namespace: "argocd"
  repo_url: "https://github.com/JinwangMok/k8s-playbox.git"
  repo_branch: "main"
  repo_pat: ""

# --- Component Versions ---
versions:
  cilium: "1.17.5"
  argocd_chart: "8.1.1"
  keycloak_chart: "25.1.2"
  cloudflared_chart: "2.1.2"
  cert_manager: "v1.18.2"
  gateway_api: "v1.3.0"
  local_path_provisioner: "v0.0.32"
