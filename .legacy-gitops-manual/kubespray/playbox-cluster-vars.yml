# ===============================================
# Kubernetes Cluster Configuration
# See Also: kubespray/inventory/<cluster>/group_vars/k8s_cluster/k8s-cluster.yml
# This file basically overwrite the values of above .yml configuration.
# ===============================================

ansible_user: jinwang
kube_owner: "{{ ansible_user }}"

kube_version: 1.33.1
kube_network_plugin: cni
kube_proxy_remove: true

cgroup_driver: systemd
kube_vip_enabled: false
helm_enabled: true

kube_oidc_auth: true
kube_oidc_url: "https://auth.jinwang.dev/realms/master"
kube_oidc_client_id: "kubernetes"
kube_oidc_username_claim: "email"
kube_oidc_username_prefix: "oidc:"
kube_oidc_groups_claim: "groups"
kube_oidc_groups_prefix: "oidc:"
kube_apiserver_enable_admission_plugins:
  - NodeRestriction
  - PodTolerationRestriction

kube_api_anonymous_auth: true