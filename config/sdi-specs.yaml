resource_pool:
  name: "playbox-pool"
  network:
    management_bridge: "br0"
    management_cidr: "192.168.88.0/24"
    gateway: "192.168.88.1"
    nameservers: ["8.8.8.8", "8.8.4.4"]

os_image:
  source: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
  format: "qcow2"

cloud_init:
  ssh_authorized_keys_file: "~/.ssh/id_ed25519.pub"
  packages: [curl, apt-transport-https, nfs-common, open-iscsi]

spec:
  sdi_pools:
    # Tower: HA management cluster — 3 dedicated control planes + 2 dedicated workers
    # kube-vip (static pod, L2/ARP) provides VIP at 192.168.88.99
    # CPs: playbox-0/1/2 (192.168.88.100-102); Workers: playbox-3 (192.168.88.103-104)
    # Host capacity: playbox-0/1/2 = 8C/15G, playbox-3 = 16C/252G
    - pool_name: "tower"
      purpose: "management"
      placement:
        spread: true  # Soft anti-affinity across hosts
      node_specs:
        - node_name: "tower-cp-0"
          ip: "192.168.88.100"
          cpu: 4
          mem_gb: 6
          disk_gb: 30
          host: "playbox-0"
          roles: [control-plane, etcd]
        - node_name: "tower-cp-1"
          ip: "192.168.88.101"
          cpu: 4
          mem_gb: 6
          disk_gb: 30
          host: "playbox-1"
          roles: [control-plane, etcd]
        - node_name: "tower-cp-2"
          ip: "192.168.88.102"
          cpu: 4
          mem_gb: 6
          disk_gb: 30
          host: "playbox-2"
          roles: [control-plane, etcd]
        - node_name: "tower-worker-0"
          ip: "192.168.88.103"
          cpu: 3
          mem_gb: 8
          disk_gb: 40
          host: "playbox-3"
          roles: [worker]
        - node_name: "tower-worker-1"
          ip: "192.168.88.104"
          cpu: 3
          mem_gb: 8
          disk_gb: 40
          host: "playbox-3"
          roles: [worker]

    # Sandbox: workload cluster — 1 dedicated CP + 3 dedicated workers
    # kube-vip (static pod, L2/ARP) provides VIP at 192.168.88.109
    # CP on playbox-3 (252GB RAM), workers spread across playbox-1/2/3
    # NOTE: sandbox-cp-0 moved OFF playbox-0 to avoid OOM — playbox-0 is the
    # bastion (ProxyJump target for all Kubespray SSH) and cannot afford 14GB VM load
    - pool_name: "sandbox"
      purpose: "workload"
      placement:
        spread: true  # Soft anti-affinity across hosts
      node_specs:
        - node_name: "sandbox-cp-0"
          ip: "192.168.88.110"
          cpu: 4
          mem_gb: 8
          disk_gb: 60
          host: "playbox-3"
          roles: [control-plane, etcd]
        - node_name: "sandbox-worker-0"
          ip: "192.168.88.120"
          cpu: 2
          mem_gb: 4
          disk_gb: 40
          host: "playbox-1"
          roles: [worker]
        - node_name: "sandbox-worker-1"
          ip: "192.168.88.121"
          cpu: 2
          mem_gb: 4
          disk_gb: 40
          host: "playbox-2"
          roles: [worker]
        - node_name: "sandbox-worker-2"
          ip: "192.168.88.122"
          cpu: 2
          mem_gb: 8
          disk_gb: 60
          host: "playbox-3"
          roles: [worker]
