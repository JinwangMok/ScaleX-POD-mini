#cloud-config
hostname: ${hostname}
manage_etc_hosts: true

users:
  - name: jinwang
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_key}

package_update: true
package_upgrade: true
packages:
  - curl
  - apt-transport-https

runcmd:
  - curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION=${k3s_version} sh -s - server --disable traefik --disable servicelb --write-kubeconfig-mode 644
  - |
    # Wait for k3s to be ready
    for i in $(seq 1 60); do
      if kubectl get nodes &>/dev/null; then
        echo "k3s is ready"
        break
      fi
      sleep 5
    done
  - |
    # Install ArgoCD
    kubectl create namespace argocd || true
    kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
